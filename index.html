<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Consulta de IP</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
  <div class="container py-5">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h1 class="text-center font-weight-bold">Consulta de IP</h1>
        <hr>

        <div id="alert-info"></div>

        <div class="form-group mt-3">
          <div class="row">
            <div class="col-md-9">
              <input type="text" id="inputIpAddress" class="form-control" placeholder="Digite o IP, ex: 8.8.8.8">
            </div>
            <div class="col-md-3">
              <button id="btnGetIp" class="btn btn-primary w-100">Pesquisar</button>
            </div>
          </div>
        </div>

        <div class="mt-4" id="resultContainer">
          <table class="table table-striped" id="ipTable">
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
